<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="user-scalable=no">
    <link rel="icon" href="icon/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon/icon.png">
    <link rel="stylesheet" href="fonts/gamefont.css">
    <title>A Simple Life with My Unobtrusive Sister ver0.99</title>
</head>

<body style="background-color:#000">
    <script>
        // Node.js polyfill: prevent TypeError when plugins call require('fs').existsSync() etc. on iOS
        if (typeof require === 'undefined') {
            var _noop = function() {};
            var _fakeFs = {
                existsSync: function() { return false; },
                readFileSync: function() { return ''; },
                writeFileSync: _noop, appendFileSync: _noop,
                mkdirSync: _noop, unlinkSync: _noop, copyFileSync: _noop,
                readdirSync: function() { return []; },
                statSync: function() { return { isFile: function() { return false; }, isDirectory: function() { return false; }, size: 0 }; },
                stat: function(p, cb) { cb && cb(new Error('ENOENT')); },
                promises: { readFile: function() { return Promise.resolve(''); }, writeFile: function() { return Promise.resolve(); }, mkdir: function() { return Promise.resolve(); }, readdir: function() { return Promise.resolve([]); } }
            };
            var _fakePath = {
                join: function() { return Array.prototype.slice.call(arguments).join('/').replace(/\/+/g, '/'); },
                dirname: function(p) { return (p || '').replace(/[\/\\][^\/\\]*$/, '') || '.'; },
                resolve: function() { return Array.prototype.slice.call(arguments).join('/'); },
                normalize: function(p) { return p || ''; },
                extname: function(p) { return ((p || '').match(/\.[^.]*$/) || [''])[0]; },
                basename: function(p) { return (p || '').split(/[\/\\]/).pop(); },
                isAbsolute: function() { return false; }
            };
            var _fakeChild = { exec: _noop, execSync: _noop, spawn: function() { return { stdout: { on: _noop }, stderr: { on: _noop }, on: _noop }; } };
            var _fakeOs = { platform: function() { return 'ios'; }, tmpdir: function() { return '/tmp'; }, cpus: function() { return []; } };
            var _fakeHttp = { createServer: function() { return { listen: _noop, on: _noop, close: _noop }; } };
            var _fakeWin = { isDevToolsOpen: function() { return false; }, showDevTools: _noop, maximize: _noop, minimize: _noop, close: _noop, on: _noop };
            var _fakeNwGui = { Shell: { openExternal: _noop, openItem: _noop }, Window: { get: function() { return _fakeWin; } } };
            var _modMap = { fs: _fakeFs, path: _fakePath, 'child_process': _fakeChild, os: _fakeOs, http: _fakeHttp, 'nw.gui': _fakeNwGui, '@nwjs/nwjs': _fakeNwGui };
            window.require = function(mod) { return _modMap[mod] || {}; };
            // process must be a FUNCTION (not object) so typeof process === 'object' is false
            // This keeps isNwjs()=false and isMobileDevice() working correctly on iOS
            var _proc = function() {};
            _proc.platform = 'ios'; _proc.cwd = function() { return '/'; };
            _proc.execPath = '/'; _proc.env = {}; _proc.mainModule = { filename: '/index.html' };
            window.process = _proc;
            window.nw = window.nw || { App: { argv: [], clearCache: _noop, quit: _noop, dataPath: '/', manifest: {} }, Window: { get: function() { return _fakeWin; } }, Shell: { openExternal: _noop, openItem: _noop } };
        }
    </script>
    <script>
        window.requestIdleCallback = window.requestIdleCallback || function(cb, options) {
            var timeout = (options && options.timeout) ? Math.min(options.timeout, 50) : 50;
            return setTimeout(function() {
                cb({ didTimeout: false, timeRemaining: function() { return 50; } });
            }, timeout > 50 ? 50 : timeout);
        };
        window.cancelIdleCallback = window.cancelIdleCallback || function(id) {
            clearTimeout(id);
        };
    </script>
    <script>
        (function() {
            var log = [];
            var minimized = false;
            function getPanel() {
                var el = document.getElementById('_err');
                if (!el) {
                    el = document.createElement('div');
                    el.id = '_err';
                    el.style.cssText = 'position:fixed;bottom:8px;left:8px;width:320px;max-height:180px;background:rgba(0,0,0,0.85);color:#ff5555;font:11px monospace;border:1px solid #ff4444;border-radius:6px;z-index:99999;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.7);';
                    var header = document.createElement('div');
                    header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:3px 6px;background:#550000;cursor:pointer;user-select:none;';
                    var title = document.createElement('span');
                    title.textContent = '⚠ JS Errors';
                    title.style.cssText = 'color:#ff9999;font-weight:bold;font-size:11px;';
                    var btns = document.createElement('span');
                    var btnMin = document.createElement('button');
                    btnMin.textContent = '−';
                    btnMin.style.cssText = 'background:none;border:none;color:#ff9999;font-size:14px;cursor:pointer;padding:0 4px;line-height:1;';
                    var btnClose = document.createElement('button');
                    btnClose.textContent = '×';
                    btnClose.style.cssText = 'background:none;border:none;color:#ff9999;font-size:16px;cursor:pointer;padding:0 4px;line-height:1;';
                    var body = document.createElement('div');
                    body.id = '_err_body';
                    body.style.cssText = 'padding:6px;overflow:auto;max-height:150px;white-space:pre-wrap;word-break:break-all;font-size:10px;';
                    btnMin.onclick = function(e) { e.stopPropagation(); minimized = !minimized; body.style.display = minimized ? 'none' : 'block'; btnMin.textContent = minimized ? '+' : '−'; el.style.maxHeight = minimized ? 'none' : '180px'; };
                    btnClose.onclick = function(e) { e.stopPropagation(); el.style.display = 'none'; };
                    btns.appendChild(btnMin); btns.appendChild(btnClose);
                    header.appendChild(title); header.appendChild(btns);
                    el.appendChild(header); el.appendChild(body);
                    document.body.appendChild(el);
                }
                return el;
            }
            function showError(msg) {
                log.push(msg);
                var el = getPanel();
                el.style.display = '';
                var body = document.getElementById('_err_body');
                if (body) { body.textContent = log.join('\n\n'); body.scrollTop = body.scrollHeight; }
            }
            window.onerror = function(msg, src, line, col, err) {
                showError('[JS ERROR]\n' + msg + '\nat ' + src + ':' + line + ':' + col + (err ? '\n' + err.stack : ''));
                return false;
            };
            window.addEventListener('unhandledrejection', function(e) {
                showError('[UNHANDLED PROMISE]\n' + (e.reason ? (e.reason.stack || e.reason) : e));
            });
        })();
    </script>
    <script src="js/main.js"></script>
</body>

</html>
